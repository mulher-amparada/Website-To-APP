<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

<title>Relógio Mundial</title>







<style>

@font-face {
  font-family: "Quicksand";
  src: url("font.ttf") format("truetype");
}

:root{

    --glass:rgba(255,255,255,.08);
    --glass-border:rgba(255,255,255,.10);

    --text:#fff;
    --muted:rgba(255,255,255,.65);

    --shadow:
    0 10px 35px rgba(0,0,0,.35);

}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

@keyframes fade {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

html,
body{
    width:100%;
    min-height:100%;
    overflow-x:hidden;

    font-family:'Quicksand',sans-serif;

    color:var(--text);
    
}

/* MAPA */

#map{
    position:fixed;
    width: 95%;
    height: 95%;
    border-radius: 10px;
    z-index:0;
    left: 2.5%;
    top: 2.5%;

    filter:
    brightness(.42)
    saturate(.9)
    contrast(1.05);

    transform:scale(1.03);
}

/* ESCURECIMENTO */

.overlay{
    position:fixed;
    inset:0;

    z-index:1;

    background:
    linear-gradient(
        to bottom,
        rgba(0,0,0,.25),
        rgba(0,0,0,.62)
    );
}

/* APP */

.app{
    position:relative;
    z-index:2;

    width:100%;

    padding:
    max(22px, env(safe-area-inset-top))
    18px
    120px;
    animation: fade 0.6s ease forwards;
}

/* TOPO */

.topbar{

    width:100%;

    display:flex;
    align-items:center;
    justify-content:space-between;

    margin-bottom:26px;
}

.top-left{
    display:flex;
    flex-direction:column;
    gap:6px;
}

.title{
    font-size:clamp(2rem, 5vw, 3rem);
    font-weight:700;
    letter-spacing:-1px;
    color: pink;
}

.subtitle{
    font-size:.95rem;
    color:var(--muted);
    font-weight:500;
}

.top-icons{
    display:flex;
    align-items:center;
    gap:10px;
}

.icon-btn{

    width:50px;
    height:50px;

    border-radius:18px;

    background:var(--glass);

    border:1px solid var(--glass-border);

    backdrop-filter:blur(12px);

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:1.2rem;

    box-shadow:var(--shadow);

    transition:.2s ease;
}

.icon-btn:active{
    transform:scale(.92);
}

/* GRID */

.cards{

    width:100%;

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(310px,1fr));

    gap:18px;
}

/* CARD */

.card{

    position:relative;

    overflow:hidden;

    min-height:160px;

    border-radius:34px;

    padding:24px;

    background:var(--glass);

    border:1px solid var(--glass-border);

    backdrop-filter:blur(18px);

    box-shadow:var(--shadow);

    display:flex;
    align-items:center;
    justify-content:space-between;

    transition:
    transform .22s ease,
    background .22s ease;
}

.card:hover{
    transform:translateY(-3px);
    background:rgba(255,255,255,.11);
}

/* brilho */

.card::before{

    content:"";

    position:absolute;

    inset:0;

    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,.12),
        transparent 45%
    );

    pointer-events:none;
}

/* esquerda */

.left{
    display:flex;
    flex-direction:column;
    gap:10px;

    min-width:0;
}

.country{

    font-size:clamp(1.3rem, 3vw, 2rem);

    font-weight:700;

    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}

.offset{

    color:var(--muted);

    font-size:1rem;

    font-weight:600;
}

/* direita */

.right{
    display:flex;
    align-items:center;
    gap:14px;
}

.time{

    font-size:clamp(1.8rem, 4vw, 3rem);

    font-weight:700;

    letter-spacing:-1px;

    white-space:nowrap;
}

.emoji{
    font-size:2rem;
}

/* NAV */

.bottom-nav{

    position:fixed;

    left:50%;
    bottom:18px;

    transform:translateX(-50%);

    width:min(92%,460px);

    padding:12px;

    z-index:10;

    border-radius:999px;

    background:rgba(35,35,35,.72);

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(18px);

    display:flex;
    justify-content:space-around;
    align-items:center;

    box-shadow:var(--shadow);
}

.nav-btn{

    width:62px;
    height:62px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:1.4rem;

    transition:.2s ease;
}

.nav-btn.active{
    background:rgba(255,255,255,.12);
}

.nav-btn:active{
    transform:scale(.92);
}

/* MOBILE */

@media (max-width:700px){

    .app{
        padding-inline:14px;
    }

    .topbar{
        align-items:flex-start;
    }

    .cards{
        grid-template-columns:1fr;
        gap:14px;
    }

    .card{
        padding:20px;
        min-height:135px;
        border-radius:28px;
    }

    .right{
        gap:10px;
    }

    .emoji{
        font-size:1.6rem;
    }

    .bottom-nav{
        bottom:12px;
    }

}

/* MOBILE PEQUENO */

@media (max-width:420px){

    .card{
        flex-direction:column;
        align-items:flex-start;
        gap:16px;
    }

    .right{
        width:100%;
        justify-content:space-between;
    }

    .time{
        font-size:2rem;
    }

}

/* SCROLL */

::-webkit-scrollbar{
    width:7px;
}

::-webkit-scrollbar-thumb{
    background:rgba(255,255,255,.15);
    border-radius:999px;
}

/* =========================
LOCAL ATUAL
========================= */

.current-location-card{

    width:100%;

    padding:24px;

    margin-bottom:22px;

    border-radius:36px;

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.10);

    backdrop-filter:blur(18px);

    box-shadow:
    0 10px 35px rgba(0,0,0,.35);

}

.current-top{

    display:flex;
    align-items:flex-start;
    justify-content:space-between;

    margin-bottom:22px;
}

.current-country{

    font-size:2rem;
    font-weight:700;

    line-height:1.1;
}

.current-city{

    margin-top:6px;

    font-size:1rem;

    color:rgba(255,255,255,.7);

    font-weight:600;
}

.live-dot{

    width:16px;
    height:16px;

    border-radius:50%;

    background:#4dff88;

    box-shadow:
    0 0 15px #4dff88;

    animation:pulse 1.4s infinite;
}

@keyframes pulse{

    0%{
        transform:scale(1);
        opacity:1;
    }

    50%{
        transform:scale(1.35);
        opacity:.6;
    }

    100%{
        transform:scale(1);
        opacity:1;
    }

}

/* GRID */

.date-grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(110px,1fr));

    gap:12px;
}

.date-box{

    padding:14px;

    border-radius:22px;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.06);

    display:flex;
    flex-direction:column;
    gap:6px;
}

.date-box span{

    font-size:.85rem;

    color:rgba(255,255,255,.6);

    font-weight:600;
}

.date-box strong{

    font-size:1.15rem;

    font-weight:700;
}

@media(max-width:600px){

    .current-country{
        font-size:1.6rem;
    }

    .date-grid{
        grid-template-columns:
        repeat(2,1fr);
    }

}

img {

width:24px;
    height:24px;

    object-fit:cover;

    

    flex-shrink:0;
    
    }
    
    svg  {
    width:24px;
    height:24px;
    
    }
</style>
</head>

<body>

<div class="overlay"></div>

<div class="app">

    <div class="topbar">

        <div class="top-left">



            <div class="subtitle">
                Fusos horários em tempo real
            </div>

        </div>

        <div class="top-icons">

            <div class="icon-btn">＋</div>

            <div class="icon-btn">  <img src="15.svg" alt="icone"/>
            </div>

            <div class="icon-btn">
              <img src="16.svg" alt="icone"/>
            </div>

        </div>

    </div>
<div class="current-location-card">

    <div class="current-top">

        <div>

            <div class="current-country" id="currentCountry">
                Carregando...
            </div>

            <div class="current-city" id="currentCity">
                Obtendo localização...
            </div>

        </div>

        <div class="live-dot"></div>

    </div>

    <div class="date-grid">

        <div class="date-box">
            <span>Ano</span>
            <strong id="yearValue">2026</strong>
        </div>

        <div class="date-box">
            <span>Semestre</span>
            <strong id="semesterValue">1º</strong>
        </div>

        <div class="date-box">
            <span>Bimestre</span>
            <strong id="bimesterValue">1º</strong>
        </div>

        <div class="date-box">
            <span>Mês</span>
            <strong id="monthValue">Janeiro</strong>
        </div>

        <div class="date-box">
            <span>Quinzena</span>
            <strong id="fortnightValue">1ª</strong>
        </div>

        <div class="date-box">
            <span>Dia</span>
            <strong id="dayValue">01</strong>
        </div>

        <div class="date-box">
            <span>Hora</span>
            <strong id="hourValue">00</strong>
        </div>

        <div class="date-box">
            <span>Minuto</span>
            <strong id="minuteValue">00</strong>
        </div>

        <div class="date-box">
            <span>Segundo</span>
            <strong id="secondValue">00</strong>
        </div>

    </div>

</div>

</div>

<script>


// =========================
// ELEMENTOS
// =========================

const currentCountry = document.getElementById("currentCountry");
const currentCity = document.getElementById("currentCity");

const yearValue = document.getElementById("yearValue");
const semesterValue = document.getElementById("semesterValue");
const bimesterValue = document.getElementById("bimesterValue");
const monthValue = document.getElementById("monthValue");
const fortnightValue = document.getElementById("fortnightValue");
const dayValue = document.getElementById("dayValue");
const hourValue = document.getElementById("hourValue");
const minuteValue = document.getElementById("minuteValue");
const secondValue = document.getElementById("secondValue");

// =========================
// DATA E HORA
// =========================

function updateDateInfo() {

    const now = new Date();

    const year = now.getFullYear();
    const month = now.getMonth() + 1;
    const day = now.getDate();

    const hour = String(now.getHours()).padStart(2, "0");
    const minute = String(now.getMinutes()).padStart(2, "0");
    const second = String(now.getSeconds()).padStart(2, "0");

    const semester = month <= 6 ? "1º" : "2º";

    const bimester = `${Math.ceil(month / 2)}º`;

    const fortnight = day <= 15 ? "1ª" : "2ª";

    const monthName = now.toLocaleString("pt-BR", {
        month: "long"
    });

    yearValue.textContent = year;
    semesterValue.textContent = semester;
    bimesterValue.textContent = bimester;
    monthValue.textContent = monthName;
    fortnightValue.textContent = fortnight;
    dayValue.textContent = day;
    hourValue.textContent = hour;
    minuteValue.textContent = minute;
    secondValue.textContent = second;
}

// =========================
// LOCALIZAÇÃO
// =========================

navigator.geolocation.getCurrentPosition(

async (position) => {

    const latitude = position.coords.latitude;
    const longitude = position.coords.longitude;

    try {

        const response = await fetch(
            `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`
        );

        const data = await response.json();

        const city =
            data.address.city ||
            data.address.town ||
            data.address.village ||
            data.address.municipality ||
            "Cidade desconhecida";

        const country =
            data.address.country ||
            "País desconhecido";

        currentCountry.textContent = country;
        currentCity.textContent = city;

    } catch (e) {

        currentCountry.textContent = "Localização atual";
        currentCity.textContent = "Não foi possível obter a cidade";

    }

},

() => {

    currentCountry.textContent = "Permissão negada";
    currentCity.textContent = "Ative a localização";

},

{
    enableHighAccuracy: true,
    timeout: 10000,
    maximumAge: 0
}

);

// =========================
// INICIAR
// =========================

updateDateInfo();

setInterval(updateDateInfo, 1000);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Planner</title>



<style>


@font-face {
  font-family: "Quicksand";
  src: url("font.ttf") format("truetype");
}

@keyframes fadeUp {
    0% {
        opacity: 0;
        transform: translateY(20px);
    }
    100% {
        opacity: 1;
        transform: translateY(0);
    }
}
:root{
--accent:#ffffff;
--accent-soft: rgba(255,255,255,0.1);
}

/* BASE */
*{box-sizing:border-box}

body{
margin:0;
font-family:'Quicksand',sans-serif;

color:#fff;
overflow-x:hidden;
animation: fadeUp 0.6s ease forwards;
}

/* MENU */
#menuToggle{
position:fixed;
top:25px;
left:25px;
z-index:4000;
cursor:pointer;
}

#menuToggle div{
width:28px;
height:3px;
background:var(--accent);
margin:6px 0;
border-radius:5px;
box-shadow:0 0 12px var(--accent);
}

/* SIDEBAR */
#sideMenu{
position:fixed;
left:-280px;
top:0;
width:280px;
height:100vh;
padding:20px;
transition:0.35s ease;
z-index:3000;
}

#sideMenu.open{left:0;}

.menuItem{
padding:12px;
margin:10px 0;
border-radius:12px;
background:rgba(255,255,255,0.04);
cursor:pointer;
transition:0.2s;
}

.menuItem:hover{
background:var(--accent-soft);
transform:translateX(5px);
}

/* CENTER */
.container{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
width:100%;
border-radius:24px;
padding:22px;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
}


#card{
border:1px solid rgba(255,255,255,0.08);
border-radius: 20px;
background: rgba(255, 255, 255, 0.05);
}


h1{text-align:center}

/* INPUTS */
input,select{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:14px;
background:rgba(0,0,0,0.6);
color:#fff;
outline:none;
border:1px solid rgba(255,255,255,0.08);
}

/* BUTTON */
button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:14px;
background:var(--accent);
color:#000;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.03);
}

/* TASKS */
.task{
margin-top:12px;
padding:14px;
border-radius:14px;
background:rgba(255,255,255,0.04);
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid rgba(255,255,255,0.06);
transition:0.2s;
}

.task:hover{
transform:scale(1.01);
background:rgba(255,255,255,0.07);
}

.task.done{
opacity:0.4;
text-decoration:line-through;
}

.cat{
font-size:11px;
opacity:0.6;
}

.actions button{
width:auto;
padding:6px 10px;
margin-left:5px;
border-radius:10px;
font-size:12px;
}

/* PRIORIDADES */
.high{border-left:4px solid #ff4d4d;}
.medium{border-left:4px solid #ffd24d;}
.low{border-left:4px solid #4dff88;}

/* TIMER */
.timer{
text-align:center;
font-size:40px;
margin:15px 0;
color:var(--accent);
text-shadow:0 0 15px var(--accent);
}

/* TEMA PICKER */
.themeBox{
margin-top:20px;
padding:12px;
background:rgba(255,255,255,0.04);
border-radius:12px;
}

.themeBox input{
margin-top:10px;
width:100%;
height:45px;
padding:5px;
border-radius:14px;
border:1px solid rgba(255,255,255,0.08);
background:rgba(0,0,0,0.6);
cursor:pointer;
}

input[type="color"]{
width:100%;
height:45px;
padding:0;
border:none;
border-radius:14px;
overflow:hidden;
cursor:pointer;
background:transparent;
}

/* Chrome / Edge / Safari */
input[type="color"]::-webkit-color-swatch-wrapper{
padding:0;
border-radius:14px;
}

input[type="color"]::-webkit-color-swatch{
border:none;
border-radius:14px;
}

/* Firefox */
input[type="color"]::-moz-color-swatch{
border:none;
border-radius:14px;
}

body.menu-open > *:not(#sideMenu):not(#menuToggle){
opacity:0;
pointer-events:none;
filter:blur(6px);
transform:scale(0.98);
transition:0.3s;
}

.voltar {
    position: relative;
    left: 65%;
    transform: translateX(-50%);

    color: pink;
    font-weight: 500;
    font-size: 14px;

    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: 0.2s ease;
top: 5px;
    white-space: nowrap;
font-weight: 700;
font-size: 20px;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menuToggle" onclick="toggleMenu()">
<div></div><div></div><div></div>
</div>

<!-- SIDEBAR -->
<div id="sideMenu">

<br><br>
<div class="menuItem" onclick="filterCat('Estudos')">Estudos</div>
<div class="menuItem" onclick="filterCat('Trabalho')">Trabalho</div>
<div class="menuItem" onclick="filterCat('Pessoal')">Pessoal</div>
<div class="menuItem" onclick="filterCat('Saúde')">Saúde</div>

<div class="themeBox">
<h4>Cor do sistema</h4>
<input type="color" id="colorPicker" onchange="changeTheme(this.value)">
</div>

</div>

<br><br><br><br><br><br><br><br>
<!-- APP -->
<div class="container">
<br><br><br><br><br><br><br><br>
<div class="card">
<br>

<input id="taskInput" placeholder="Nova tarefa"/>

<select id="category">
<option>Estudos</option>
<option>Trabalho</option>
<option>Pessoal</option>
<option>Saúde</option>
</select>

<select id="priority">
<option value="low">Baixa</option>
<option value="medium">Média</option>
<option value="high">Alta</option>
</select>

<button onclick="addTask()">Adicionar</button>

<div id="list"></div>

<br><br><br><br><br><br><br><br>

<hr style="margin:15px 0;border:1px solid rgba(255,255,255,0.08)"/>

<h3 style="text-align:center;">Pomodoro</h3>
<div class="timer" id="timer">25:00</div>

<button onclick="startPomodoro()">Iniciar</button>
<button onclick="resetPomodoro()">Reset</button>

</div>
</div>

<script>

let tasks = [];

try {

    const dados = Cripto.carregar("tasks");

    tasks = dados
        ? JSON.parse(dados)
        : [];

} catch(e) {

    tasks = [];
}
let currentFilter = "Todos";

/* THEME */
let savedColor = "";

try {

    savedColor = Cripto.carregar("accent");

} catch(e) {

    savedColor = "";
}
if(savedColor){
document.documentElement.style.setProperty("--accent", savedColor);
document.documentElement.style.setProperty("--accent-soft", savedColor+"22");
const picker = document.getElementById("colorPicker");
if(picker) picker.value = savedColor;
}

function changeTheme(color){
document.documentElement.style.setProperty("--accent", color);
document.documentElement.style.setProperty("--accent-soft", color+"22");
Cripto.salvar(
    "accent",
    color
);
}

/* SAVE */
function save(){

    Cripto.salvar(
        "tasks",
        JSON.stringify(tasks)
    );

    render();
}

/* ADD */
function addTask(){
const text = document.getElementById("taskInput").value;
if(!text) return;

tasks.push({
text,
cat:document.getElementById("category").value,
priority:document.getElementById("priority").value,
done:false
});

document.getElementById("taskInput").value="";
save();
}

/* ENTER */
document.addEventListener("keydown",(e)=>{
if(e.key==="Enter" && document.activeElement.id==="taskInput"){
addTask();
}
});

/* TOGGLE DONE */
function toggle(i){
tasks[i].done = !tasks[i].done;
save();
}

/* DELETE */
function del(i){
tasks.splice(i,1);
save();
}

/* FILTER */
function filterCat(cat){
currentFilter = cat;
toggleMenu();
render();
}

/* RENDER */
function render(){
const list = document.getElementById("list");
if(!list) return;

list.innerHTML = "";

tasks.forEach((t,i)=>{
if(currentFilter !== "Todos" && t.cat !== currentFilter) return;

list.innerHTML += `
<div class="task ${t.priority} ${t.done ? "done" : ""}">
<div>
<b>${t.text}</b><br>
<span class="cat">${t.cat} • ${t.priority}</span>
</div>

<div class="actions">
<button onclick="toggle(${i})">✔</button>
<button onclick="del(${i})">✖</button>
</div>
</div>
`;
});
}

/* MENU + FOCUS MODE (SEM OVERLAY) */
function toggleMenu(){
const menu = document.getElementById("sideMenu");
menu.classList.toggle("open");
document.body.classList.toggle("menu-open");
}

/* POMODORO */
let time = 1500;
let interval = null;

function update(){
const timer = document.getElementById("timer");
if(!timer) return;

let m = Math.floor(time/60);
let s = time % 60;

timer.innerText = `${m}:${s < 10 ? "0" : ""}${s}`;
}

function startPomodoro(){
if(interval) return;

interval = setInterval(()=>{
time--;
update();

if(time <= 0){
clearInterval(interval);
interval = null;
time = 1500;
update();
alert("Foco finalizado");
}
},1000);
}

function resetPomodoro(){
clearInterval(interval);
interval = null;
time = 1500;
update();
}

/* INIT */
update();
render();

document.querySelector(".voltar").onclick = function() {
    window.location.href = "botao.html";
};
</script>

<script>
window.addEventListener("load", () => {

    let wall = "";

    try {
        wall = Android.getWallpaperUrl();
    } catch (e) {}

    if (wall && wall.length > 0) {

        document.body.style.backgroundImage = `url('${wall}')`;
        document.body.style.backgroundSize = "cover";
        document.body.style.backgroundPosition = "center";
        document.body.style.backgroundRepeat = "no-repeat";
        document.body.style.backgroundAttachment = "fixed";

    } else {

        document.body.style.background = "black";

    }
});
</script>
</body>
</html>

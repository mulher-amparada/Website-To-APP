<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mulher Amparada • Fitness</title>




<style>

@font-face {
  font-family: "Quicksand";
  src: url("font.ttf") format("truetype");
}

:root{
  --rosa:#ff4d88;
  --rosa2:#ff99cc;
  --preto:#000;
  --card:#111;
  --card2:#1a1a1a;
  --texto:#fff;
  --texto2:#b5b5b5;
  --verde:#00d084;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Quicksand',sans-serif;
}

body{
  
  color:white;
  min-height:100vh;
  overflow-x:hidden;
}

/* ========================= */
/* HEADER */
/* ========================= */

.topo{
  padding:25px 20px;
  animation:fade .5s ease;
}

.logo{
  font-size:30px;
  font-weight:700;
  background:linear-gradient(45deg,#ff4d88,#ff99cc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-top: 10px;
}

.sub{
  color:var(--texto2);
  margin-top:5px;
}

/* ========================= */
/* CONTAINER */
/* ========================= */

.container{
  padding:20px;
  padding-bottom:120px;
  animation:fade .5s ease;
}

/* ========================= */
/* CARD */
/* ========================= */

.card{
  background:rgba(25,25,25,.9);
  border-radius:28px;
  padding:22px;
  margin-bottom:18px;
  backdrop-filter:blur(14px);
  box-shadow:
  0 10px 30px rgba(0,0,0,.35),
  0 0 20px rgba(255,77,136,.08);


}

@keyframes fade{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* ========================= */
/* TITULOS */
/* ========================= */

h2{
  font-size:22px;
  margin-bottom:18px;
}

h3{
  margin-bottom:12px;
  font-size:18px;
}

p{
  color:var(--texto2);
}

/* ========================= */
/* PROGRESSO */
/* ========================= */

.progress{
  width:100%;
  height:16px;
  background:#222;
  border-radius:50px;
  overflow:hidden;
  margin-top:15px;
}

.bar{
  height:100%;
  width:0%;
  border-radius:50px;
  background:linear-gradient(90deg,#ff4d88,#ff99cc);
  transition:.4s;
  box-shadow:0 0 20px #ff4d88;
}

.stats{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
  margin-top:18px;
}

.stat{
  background:#161616;
  border-radius:20px;
  padding:15px;
  text-align:center;
}

.stat h1{
  font-size:22px;
  color:#fff;
}

.stat span{
  color:var(--texto2);
  font-size:13px;
}

/* ========================= */
/* BOTÕES */
/* ========================= */

button{
  width:100%;
  border:none;
  border-radius:18px;
  padding:16px;
  margin-top:10px;
  font-size:15px;
  font-weight:700;
  color:white;
  cursor:pointer;
  transition:.25s;
  background:linear-gradient(45deg,#ff4d88,#ff99cc);
  box-shadow:0 5px 18px rgba(255,77,136,.25);
  border-radius: 200px;
}

button:hover{
  transform:scale(1.02);
}

button:active{
  transform:scale(.97);
}

.btn2{
  background:#1f1f1f;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:none;
}

.btn-danger{
  background:linear-gradient(45deg,#ff0000,#ff4d4d);
}

/* ========================= */
/* INPUT */
/* ========================= */

input{
  width:100%;
  border:none;
  outline:none;
  margin-top:12px;
  border-radius:18px;
  padding:16px;
  background:#151515;
  color:white;
  font-size:15px;
}

/* ========================= */
/* EXERCICIO */
/* ========================= */

.exercicio{
  background:#141414;
  border-radius:20px;
  padding:18px;
  margin-top:15px;
}

.timer{
  font-size:55px;
  font-weight:700;
  text-align:center;
  margin-top:12px;
  background:linear-gradient(45deg,#ff4d88,#ff99cc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ========================= */
/* CONQUISTAS */
/* ========================= */

.conquista{
  background:#141414;
  border-radius:18px;
  padding:15px;
  margin-top:10px;
  border-left:4px solid #ff4d88;
}

.conquista b{
  color:white;
}

/* ========================= */
/* POPUP */
/* ========================= */

.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:999;
}

.popup-box{
  width:100%;
  max-width:350px;
  background:#111;
  border-radius:28px;
  padding:30px 20px;
  text-align:center;
  animation:pop .25s ease;
}

@keyframes pop{
  from{
    transform:scale(.8);
    opacity:0;
  }
  to{
    transform:scale(1);
    opacity:1;
  }
}

.popup-box h2{
  margin-bottom:10px;
}

/* ========================= */
/* FOOTER */
/* ========================= */

.footer{
  text-align:center;
  color:#666;
  margin-top:30px;
  font-size:13px;
}

img {

width:24px;
    height:24px;

    object-fit:cover;

    

    flex-shrink:0;
    
    }
    
    svg  {
    width:24px;
    height:24px;
    
    }
</style>
</head>

<body>

<div class="bg">
  <div class="bola b1"></div>
  <div class="bola b2"></div>
</div>

<!-- TOPO -->

<div class="topo">

  <div class="logo">


    Rotina gamificada:
  </div>
  
</div>

<!-- CONTAINER -->

<div class="container">

  <!-- PROGRESSO -->

  <div class="card">



    <div class="progress">
      <div class="bar" id="barraXP"></div>
    </div>

    <div class="stats">

      <div class="stat">
        <h1 id="xpTexto">0</h1>
        <span>XP</span>
      </div>

      <div class="stat">
        <h1 id="nivelTexto">1</h1>
        <span>Nível</span>
      </div>

      <div class="stat">
        <h1 id="streakTexto">0</h1>
        <span>Streak</span>
      </div>

    </div>

  </div>

  <!-- TREINO -->

  <div class="card">

    <h2>  <img src="17.svg" alt="icone"/> Treino</h2>

    <button onclick="iniciarTreinoNivel('Iniciante')">
 Iniciante
    </button>

    <button onclick="iniciarTreinoNivel('Intermediário')">
 Intermediário
    </button>

    <button onclick="iniciarTreinoNivel('Avançado')">
 Avançado
    </button>

    <div class="exercicio">

      <h3 id="nomeEx">
        Nenhum exercício iniciado
      </h3>

      <p id="descricaoEx">
        Escolha um nível para começar
      </p>

      <div class="timer" id="tempo">
        30
      </div>

    </div>

  </div>

  <!-- HIDRATAÇÃO -->

  <div class="card">

    <h2>  <img src="18.svg" alt="icone"/> Hidratação</h2>

    <button onclick="beber('agua')">
      Beber água
    </button>

    <button class="btn2" onclick="beber('refri')">
      Refrigerante
    </button>

  </div>

  <!-- ALIMENTAÇÃO -->

  <div class="card">

    <h2>  <img src="19.svg" alt="icone"/> Alimentação</h2>

    <button onclick="comer('saudavel')">
      Comida saudável
    </button>

    <button class="btn2" onclick="comer('fast')">
      Fast food
    </button>

  </div>

  <!-- PESO -->

  <div class="card">

    <h2>  <img src="20.svg" alt="icone"/> Peso</h2>

    <input
      id="peso"
      type="number"
      placeholder="Digite seu peso"
    >

    <button onclick="salvarPeso()">
      Salvar peso
    </button>

    <p id="pesoTexto" style="margin-top:15px;"></p>

  </div>

  <!-- CONQUISTAS -->

  <div class="card">

    <h2>  <img src="21.svg" alt="icone"/>
    Conquistas</h2>

    <div id="conquistas"></div>

  </div>

  <!-- RESET -->

  <button
    class="btn-danger"
    onclick="resetarDados()"
  >
 Resetar tudo
  </button>

</div>

<!-- POPUP -->

<div class="popup" id="popup">

  <div class="popup-box">

    <h2 id="pt"></h2>

    <p id="px"></p>

    <button onclick="fechar()">
      OK
    </button>

  </div>

</div>

<script>

/* ========================= */
/* DADOS */
/* ========================= */

let xp =
parseInt(Cripto.carregar("xp")) || 0;

let nivel =
parseInt(Cripto.carregar("nivel")) || 1;

let streak =
parseInt(Cripto.carregar("streak")) || 0;

let conquistas =
JSON.parse(
  Cripto.carregar("conquistas") || "[]"
);

/* ========================= */
/* CONQUISTAS */
/* ========================= */

let listaConquistas = [

{
id:"nivel2",
nome:"Subindo 🚀",
desc:"Chegou ao nível 2"
},

{
id:"nivel5",
nome:"Focada 🔥",
desc:"Chegou ao nível 5"
},

{
id:"desafio1",
nome:"Primeiro desafio 🎯",
desc:"Concluiu um desafio"
}

];

function ganharConquista(id){

  if(conquistas.includes(id)) return;

  conquistas.push(id);

  Cripto.salvar(
    "conquistas",
    JSON.stringify(conquistas)
);

  let c =
  listaConquistas.find(c=>c.id===id);

  popup(
    "🏆 Nova conquista!",
    c.nome + " • " + c.desc
  );

  renderConquistas();
}

function renderConquistas(){

  let div =
  document.getElementById("conquistas");

  div.innerHTML = "";

  if(conquistas.length === 0){

    div.innerHTML = `
      <p>
        Nenhuma conquista ainda 😢
      </p>
    `;

    return;
  }

  conquistas.forEach(id=>{

    let c =
    listaConquistas.find(x=>x.id===id);

    div.innerHTML += `
      <div class="conquista">
        <b>${c.nome}</b>
        <br>
        <small>${c.desc}</small>
      </div>
    `;
  });
}

/* ========================= */
/* TREINO */
/* ========================= */

let exercicios = {

"Iniciante":[
"Caminhada leve",
"Agachamento",
"Polichinelo"
],

"Intermediário":[
"Corrida",
"Flexão",
"Abdominal"
],

"Avançado":[
"Sprint",
"Burpee",
"HIIT pesado"
]

};

let lista = [];
let atual = 0;
let tempo = 30;
let intervalo;

function iniciarTreinoNivel(nivelEscolhido){

  lista =
  exercicios[nivelEscolhido];

  atual = 0;

  proximo();
}

function proximo(){

  if(atual >= lista.length){

    ganharXP(20);

    streak++;

    salvar();

    popup(
      "Treino concluído 💪",
      "Você foi incrível!"
    );

    atualizarUI();

    return;
  }

  document.getElementById(
    "nomeEx"
  ).innerText = lista[atual];

  document.getElementById(
    "descricaoEx"
  ).innerText =
  "Continue firme ✨";

  iniciarContagem();
}

function iniciarContagem(){

  clearInterval(intervalo);

  tempo = 30;

  document.getElementById(
    "tempo"
  ).innerText = tempo;

  intervalo = setInterval(()=>{

    tempo--;

    document.getElementById(
      "tempo"
    ).innerText = tempo;

    if(tempo <= 0){

      clearInterval(intervalo);

      atual++;

      popup(
        "Boa 🔥",
        "Próximo exercício!"
      );

      setTimeout(proximo,1200);
    }

  },1000);
}

/* ========================= */
/* XP */
/* ========================= */

function ganharXP(q){

  xp += q;

  if(xp >= nivel * 100){

    xp = 0;

    nivel++;

    popup(
      "🚀 Novo nível!",
      "Agora você está no nível " + nivel
    );

    if(nivel === 2)
    ganharConquista("nivel2");

    if(nivel === 5)
    ganharConquista("nivel5");
  }

  salvar();

  atualizarUI();
}

/* ========================= */
/* HIDRATAÇÃO */
/* ========================= */

function beber(tipo){

  if(tipo === "agua"){

    ganharXP(5);

    popup(
      "Boa 💧",
      "Hidratação perfeita!"
    );

  }else{

    popup(
      "Hmm 😅",
      "Evite exageros!"
    );
  }
}

/* ========================= */
/* ALIMENTAÇÃO */
/* ========================= */

function comer(tipo){

  if(tipo === "saudavel"){

    ganharXP(5);

    popup(
      "Perfeito 💚",
      "Ótima escolha!"
    );

  }else{

    popup(
      "Tudo bem 👍",
      "Mas tente equilibrar."
    );
  }
}

/* ========================= */
/* PESO */
/* ========================= */

function salvarPeso(){

  let p =
  document.getElementById("peso").value;

  if(!p){

    popup(
      "Ops 😅",
      "Digite um peso válido!"
    );

    return;
  }

  Cripto.salvar(
    "peso",
    p
);

  document.getElementById(
    "pesoTexto"
  ).innerText =
  "Peso atual: " + p + " kg";

  popup(
    "Peso salvo 💾",
    "Atualizado com sucesso!"
  );
}

/* ========================= */
/* RESET */
/* ========================= */

let confirmarReset = false;

function resetarDados(){

  if(!confirmarReset){

    confirmarReset = true;

    popup(
      "⚠️ Atenção",
      "Clique novamente para confirmar."
    );

    setTimeout(()=>{
      confirmarReset = false;
    },3000);

    return;
  }

  Cripto.limparTudo();

  xp = 0;
  nivel = 1;
  streak = 0;
  conquistas = [];

  atualizarUI();

  renderConquistas();

  document.getElementById(
    "pesoTexto"
  ).innerText = "";

  popup(
    "Dados apagados 🗑️",
    "Tudo foi resetado."
  );
}

/* ========================= */
/* UI */
/* ========================= */

function atualizarUI(){

  document.getElementById(
    "xpTexto"
  ).innerText = xp;

  document.getElementById(
    "nivelTexto"
  ).innerText = nivel;

  document.getElementById(
    "streakTexto"
  ).innerText = streak;

  let porcent =
  (xp / (nivel * 100)) * 100;

  document.getElementById(
    "barraXP"
  ).style.width =
  porcent + "%";
}

/* ========================= */
/* POPUP */
/* ========================= */

function popup(t,x){

  document.getElementById(
    "pt"
  ).innerText = t;

  document.getElementById(
    "px"
  ).innerText = x;

  document.getElementById(
    "popup"
  ).style.display = "flex";
}

function fechar(){

  document.getElementById(
    "popup"
  ).style.display = "none";
}

/* ========================= */
/* SALVAR */
/* ========================= */
function salvar(){

    Cripto.salvar(
        "xp",
        xp
    );

    Cripto.salvar(
        "nivel",
        nivel
    );

    Cripto.salvar(
        "streak",
        streak
    );
}

/* ========================= */
/* LOAD */
/* ========================= */

window.onload = ()=>{

  atualizarUI();

  renderConquistas();

  let p =
Cripto.carregar("peso");

  if(p){

    document.getElementById(
      "pesoTexto"
    ).innerText =
    "Peso atual: " + p + " kg";
  }
};

</script>

<script>
window.addEventListener("load", () => {

    let wall = "";

    try {
        wall = Android.getWallpaperUrl();
    } catch (e) {}

    if (wall && wall.length > 0) {

        document.body.style.backgroundImage = `url('${wall}')`;
        document.body.style.backgroundSize = "cover";
        document.body.style.backgroundPosition = "center";
        document.body.style.backgroundRepeat = "no-repeat";
        document.body.style.backgroundAttachment = "fixed";

    } else {

        document.body.style.background = "black";

    }
});
</script>

</body>
</html>

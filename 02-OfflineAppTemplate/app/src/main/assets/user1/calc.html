<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Neo Calc</title>

<style>
/* Garante que o preenchimento (padding) não estique os elementos */
* {
  box-sizing: border-box;
}

@font-face {
  font-family: "Quicksand";
  src: url("font.ttf") format("truetype");
}

@keyframes fade {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

body {
  margin: 0;
  font-family: 'Quicksand', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
  animation: fade 0.6s ease forwards;
}

/* Define um tamanho fixo máximo para não esticar na horizontal */
.calculadora {
  width: 100%;
  max-width: 340px;
  border-radius: 25px;
  padding: 18px;
}

/* TELA estilo “painel” */
.tela {
  background: #050505;
  border: 1px solid #1f1f1f;
  border-radius: 18px;
  padding: 18px;
  min-height: 120px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: flex-end;
  gap: 6px;
  width: 100%;
  overflow: hidden; /* Garante que nada saia da tela */
}

.historico {
  font-size: 13px;
  opacity: 0.4;
  width: 100%;
  text-align: right;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

#display {
  font-size: 38px;
  letter-spacing: 1px;
  width: 100%;
  text-align: right;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis; /* Adiciona os '...' se o número for gigante */
}

/* GRID MAIS ESPAÇADO */
.botoes {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-top: 15px;
  width: 100%;
}

/* BOTÕES DIFERENTES DO PADRÃO SAMSUNG */
.botao {
  height: 60px;
  border-radius: 140px;
  border: 1px solid #1f1f1f;
  font-size: 18px;
  cursor: pointer;
  background: #121212;
  color: white;
  transition: 0.15s;
}

/* efeito só no clique */
.botao:active {
  transform: scale(0.96);
  box-shadow: 0 0 12px rgba(0,255,200,0.25);
}

/* operadores */
.operador {
  color: #00ffd0;
}

/* igual estilo “energia” */
.igual {
  background: linear-gradient(135deg,#00ffd0,#00a8ff);
  color: black;
  border: none;
}

/* danger vermelho real */
.danger {
  color: #ff3b3b;
}

.danger:active {
  box-shadow: 0 0 14px rgba(255,0,0,0.5);
}

/* vibração resultado */
.vibrar {
  animation: vib 0.18s linear 2;
}

@keyframes vib {
  0% { transform: translate(0) }
  25% { transform: translate(-3px,2px) }
  50% { transform: translate(3px,-2px) }
  75% { transform: translate(-2px,2px) }
  100% { transform: translate(0) }
}

.voltar {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  color: pink;
  font-weight: 700;
  font-size: 20px;
  padding: 6px 14px;
  border-radius: 999px;
  cursor: pointer;
  transition: 0.2s ease;
  top: 5px;
  white-space: nowrap;
}
</style>
</head>

<body>

<div class="calculadora">

  <div class="tela">
    <div class="historico" id="historico"></div>
    <div id="display">0</div>
  </div>

  <div class="botoes">
    <button class="botao danger" data-v="C">C</button>
    <button class="botao danger" data-v="back">⌫</button>
    <button class="botao operador" data-v="%">%</button>
    <button class="botao operador" data-v="/">÷</button>

    <button class="botao" data-v="7">7</button>
    <button class="botao" data-v="8">8</button>
    <button class="botao" data-v="9">9</button>
    <button class="botao operador" data-v="*">×</button>

    <button class="botao" data-v="4">4</button>
    <button class="botao" data-v="5">5</button>
    <button class="botao" data-v="6">6</button>
    <button class="botao operador" data-v="-">−</button>

    <button class="botao" data-v="1">1</button>
    <button class="botao" data-v="2">2</button>
    <button class="botao" data-v="3">3</button>
    <button class="botao operador" data-v="+">+</button>

    <button class="botao" data-v="(">(</button>
    <button class="botao" data-v="0">0</button>
    <button class="botao" data-v=")">)</button>
    <button class="botao igual" data-v="=">=</button>
  </div>

</div>

<script>
let display = document.getElementById("display");
let historico = document.getElementById("historico");

let expr = "";

function atualizar(){
  display.innerText = expr || "0";
}

function vibrar(){
  display.classList.add("vibrar");
  setTimeout(()=> display.classList.remove("vibrar"), 350);
}

function calcular(){
  try{
    let resultado = Function("return " + expr)();
    historico.innerText = expr;
    expr = String(resultado);
    vibrar();
  }catch{
    expr = "";
    display.innerText = "Erro";
    vibrar();
    return;
  }
  atualizar();
}

document.querySelectorAll(".botao").forEach(btn=>{
  btn.onclick = ()=> {
    let v = btn.dataset.v;

    if(v === "C"){
      expr = "";
    }
    else if(v === "back"){
      expr = expr.slice(0,-1);
    }
    else if(v === "="){
      calcular();
      return;
    }
    else{
      expr += v;
    }

    atualizar();
  }
});

document.addEventListener("keydown",(e)=>{
  if("0123456789+-*/().%".includes(e.key)){
    expr += e.key;
  }
  if(e.key === "Backspace"){
    expr = expr.slice(0,-1);
  }
  if(e.key === "Enter"){
    calcular();
  }
  if(e.key === "Escape"){
    expr = "";
  }
  atualizar();
});

atualizar();

// Correção aqui: Verifica se o botão "voltar" realmente existe na tela antes de aplicar a função
let btnVoltar = document.querySelector(".voltar");
if (btnVoltar) {
  btnVoltar.onclick = function() {
    window.location.href = "botao.html";
  };
}
</script>

<script>
window.addEventListener("load", () => {
    let wall = "";
    try {
        wall = Android.getWallpaperUrl();
    } catch (e) {}

    if (wall && wall.length > 0) {
        document.body.style.backgroundImage = `url('${wall}')`;
        document.body.style.backgroundSize = "cover";
        document.body.style.backgroundPosition = "center";
        document.body.style.backgroundRepeat = "no-repeat";
        document.body.style.backgroundAttachment = "fixed";
    } else {
        document.body.style.background = "black";
    }
});
</script>

</body>
</html>
